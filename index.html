<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>日経 記事マップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
<script type="module">
  import * as pdfjs from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@5.6.205/build/pdf.min.mjs';
  pdfjs.GlobalWorkerOptions.workerSrc =
    'https://cdn.jsdelivr.net/npm/pdfjs-dist@5.6.205/build/pdf.worker.min.mjs';
  window.pdfjsLib = pdfjs;
</script>
<style>
:root{
  --bg:#f7f4ed; --surface:#faf8f2; --s2:#f0ece0; --border:#c8c0a8;
  --text:#1a1208; --text2:#3d3120; --muted:#7a6d58; --accent:#b8000a;
  --hh:0px; /* header height, set by JS */
  --panel:637px; /* article panel width */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100vh;overflow:hidden;margin:0;padding:0;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);}

/* ── HEADER ── */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:600;
  background:#edf1f5;
  border-bottom:1px solid #d3dbe5;
  padding:3px 8px 2px;
  box-shadow:0 1px 6px rgba(70,88,110,.12);
}
/* date tabs row */
.dtabs{display:flex;gap:3px;margin-bottom:2px;overflow-x:auto;padding-bottom:1px;}
.dtabs::-webkit-scrollbar{display:none;}
.dtab{flex-shrink:0;padding:3px 10px;border-radius:2px;font-size:11px;font-weight:700;
  border:1px solid transparent;cursor:pointer;font-family:'Noto Sans JP',sans-serif;
  transition:all .15s;white-space:nowrap;background:transparent;color:#6f7f90;
  -webkit-user-select:none;user-select:none;}
.dtab:hover{color:#34495e;background:#e1e7ee;}
.dtab.on{color:#34495e;background:#d7dee7;border-color:#c3ceda;}
.dtab:active{transform:scale(.95);}
/* edition + category + search row */
.hrow2{display:flex;align-items:center;gap:4px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;}
.hrow2::-webkit-scrollbar{display:none;}
.cats{display:flex;gap:3px;overflow-x:auto;flex:1;min-width:0;}
.cats::-webkit-scrollbar{display:none;}
.cchip{flex-shrink:0;padding:2px 8px;border-radius:2px;font-size:10px;font-weight:700;
  border:1px solid #c8d2df;cursor:pointer;transition:all .15s;white-space:nowrap;color:#526577;background:#f5f7fa;}
/* TTS */
.tts-bar{display:flex;align-items:center;gap:5px;margin:10px 11px 4px;padding:7px 10px;
  background:#edf1f5;border-radius:2px;border:1px solid #d3dbe5;flex-wrap:wrap;}
.tts-btn{flex-shrink:0;padding:5px 11px;border-radius:20px;border:none;cursor:pointer;
  font-size:11px;font-weight:700;font-family:inherit;
  background:#f5f7fa;color:#526577;border:1px solid #c8d2df;border-radius:2px;transition:all .15s;}
.tts-btn:hover{background:#d3dce7;color:#34495e;}
.tts-btn.playing{background:#6f7f90;color:#fff;border-color:#6f7f90;animation:pulse .8s infinite;}
.despina-btn{background:#f5f7fa;color:#526577;}
.despina-btn:hover{background:#d3dce7;color:#34495e;}
.despina-btn.playing{background:#6f7f90;color:#fff;border-color:#6f7f90;animation:pulse .8s infinite;}
.tts-nav{flex-shrink:0;padding:5px 9px;border-radius:2px;border:1px solid var(--border);cursor:pointer;
  font-size:11px;font-weight:700;font-family:inherit;
  background:#f5f7fa;color:#526577;transition:all .15s;}
.tts-nav:hover{background:#d3dce7;color:#34495e;}
.tts-nav:disabled{opacity:.35;cursor:default;}
.tts-speed{font-size:10px;color:var(--muted);margin-left:2px;}
.tts-spd-btn{font-size:10px;padding:3px 8px;border-radius:2px;border:1px solid var(--border);
  background:var(--surface);color:var(--muted);font-family:inherit;cursor:pointer;font-weight:700;transition:all .15s;}
.tts-spd-btn:hover{border-color:#aeb9c6;color:#425466;}
.tts-spd-btn.active{background:#d7dee7;color:#34495e;border-color:#c3ceda;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.tts-hl{
  background:linear-gradient(180deg, transparent 60%, #ffe898 60%);
  color:var(--text);border-radius:1px;font-weight:700;transition:background .12s;
}
.tts-hl-title{
  background:linear-gradient(180deg, transparent 55%, #ffd54f 55%);
  color:var(--text);border-radius:1px;font-weight:900;
}
.tts-word{
  background:#2e7d32;color:#fff;border-radius:2px;padding:0 1px;
  box-shadow:0 0 0 1px #2e7d32;
}
.tts-voice-sel{font-size:10px;padding:3px 6px;border-radius:6px;border:1px solid var(--border);
  background:#fff;color:var(--text);font-family:inherit;cursor:pointer;max-width:130px;}
/* カスタム音声ドロップダウン */
.tts-vdrop-wrap{position:relative;display:inline-block;}
.tts-vdrop-btn{font-size:10px;padding:4px 8px;border-radius:6px;border:1px solid var(--border);
  background:#fff;color:var(--text);font-family:inherit;cursor:pointer;
  white-space:nowrap;max-width:130px;overflow:hidden;text-overflow:ellipsis;
  display:flex;align-items:center;gap:4px;}
.tts-vdrop-btn:hover{background:var(--s2);}
.tts-vdrop-btn::after{content:'▾';font-size:9px;flex-shrink:0;}
.tts-vdrop-list{position:absolute;bottom:calc(100% + 4px);left:0;z-index:9999;
  background:#fff;border:1px solid var(--border);border-radius:8px;
  box-shadow:0 4px 20px rgba(0,40,100,.18);min-width:180px;max-height:220px;
  overflow-y:auto;display:none;padding:4px 0;}
.tts-vdrop-list.open{display:block;}
.tts-vdrop-item{padding:7px 12px;font-size:11px;cursor:pointer;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-family:inherit;border:none;background:none;width:100%;text-align:left;}
.tts-vdrop-item:hover{background:var(--s2);}
.tts-vdrop-item.selected{color:var(--accent);font-weight:800;}
.tts-vdrop-bad{color:#aaa !important;}
.tts-vdrop-bad:hover{background:var(--s2);color:#888 !important;}
.tts-vdrop-hdr{padding:5px 12px 2px;font-size:10px;font-weight:800;
  color:var(--muted);border-top:1px solid var(--border);margin-top:2px;}
.tts-vdrop-hdr:first-child{border-top:none;margin-top:0;}
.pdf-btn{font-size:11px;color:var(--muted);text-decoration:underline;cursor:pointer;padding:2px 3px;white-space:nowrap;border:none;background:none;font-family:'Noto Sans JP',sans-serif;}
.pdf-btn:hover{color:var(--accent);}
.pdf-lbl{font-size:11px;color:var(--muted);padding:2px 3px;white-space:nowrap;}
.sum-btn{font-size:11px;color:var(--accent);text-decoration:underline;cursor:pointer;padding:2px 1px;white-space:nowrap;background:none;border:none;font-family:inherit;font-weight:700;}
.sum-btn:hover{opacity:.7;}
#sumModal{position:fixed;inset:0;z-index:2000;background:rgba(5,15,35,.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
#sumModal.vis{opacity:1;pointer-events:auto;}
#sumBox{background:#fff;border-radius:4px;width:92vw;max-width:600px;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 16px 56px rgba(0,30,80,.28);overflow:hidden;}
#sumHead{padding:14px 16px 12px;border-bottom:1px solid #e8f0f8;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#sumClose{width:28px;height:28px;border-radius:2px;border:1px solid var(--border);background:var(--s2);font-size:14px;cursor:pointer;color:#3a5268;}
#sumBody{overflow-y:auto;padding:14px 16px 20px;font-size:13px;line-height:1.8;color:#1a2d42;}
#sumBody h4{margin:12px 0 3px;font-size:12px;font-weight:800;color:#b01820;}
#sumBody p{margin:0 0 7px;}
#sumBody::-webkit-scrollbar{width:4px;}
#sumBody::-webkit-scrollbar-thumb{background:#c5d5e8;border-radius:4px;}

/* edition + search row */
.hrow2{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
.ed-wrap{display:flex;gap:4px;}
.ed-btn{padding:4px 13px;border-radius:2px;font-size:11px;font-weight:700;
  border:1px solid #c8d2df;cursor:pointer;background:#f5f7fa;color:#526577;
  font-family:'Noto Sans JP',sans-serif;transition:all .15s;white-space:nowrap;
  -webkit-user-select:none;user-select:none;}
.ed-btn.on{color:#34495e;background:#d7dee7;border-color:#c3ceda;}
.ed-mor.on{background:#d7dee7;border-color:#c3ceda;}
.ed-eve.on{background:#d7dee7;border-color:#c3ceda;}

/* category filter chips */
.cats{display:flex;gap:4px;overflow-x:auto;padding-bottom:8px;}
.cats::-webkit-scrollbar{display:none;}
.cchip{flex-shrink:0;padding:4px 11px;border-radius:2px;font-size:10px;font-weight:700;
  border:1px solid #c8d2df;cursor:pointer;transition:all .15s;white-space:nowrap;color:#526577;background:#f5f7fa;
  -webkit-user-select:none;user-select:none;}
.cchip.on{color:#34495e!important;}
.cchip:active{transform:scale(.95);}

/* search btn */
#srchBtn{flex-shrink:0;padding:3px 8px;border-radius:2px;
  border:1px solid #c8d2df;background:#f5f7fa;color:#526577;
  font-size:11px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
  cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none;}
#srchBtn:active{background:var(--accent);color:#fff;border-color:var(--accent);}

:root{
  --left-w: 72%;
  --panel-w: 28%;
  --pdf-expand-duration: 0.3s;
}
#main{position:fixed;top:var(--hh);left:0;right:0;bottom:0;display:flex;flex-direction:row;overflow:hidden;}
#pdf-wrap{width:100%;flex:1;display:flex;flex-direction:column;background:#e6ebf1;min-height:0;overflow:hidden;position:relative;border-top:1px solid #d3dbe5;}
#pdf-toolbar{display:flex;align-items:center;gap:4px;padding:3px 8px;background:#edf1f5;color:#425466;font-size:12px;flex-shrink:0;flex-wrap:wrap;border-bottom:1px solid #d4dce6;}
#pdf-toolbar button{background:#dfe6ee;color:#425466;border:1px solid #c8d2df;padding:2px 6px;border-radius:4px;cursor:pointer;font-size:11px;}
#pdf-toolbar button:hover{background:#d3dce7;}
#pdf-toolbar button.ed-active{background:#d7dee7;color:#34495e;border-color:#c3ceda;}
#pdf-canvas-wrap{width:100%;flex:1;overflow:hidden;position:relative;min-height:0;background:#e9edf2;cursor:grab;}
#pdf-canvas-wrap.grabbing{cursor:grabbing;}
#pdf-pages{display:flex;flex-direction:column;align-items:flex-start;gap:8px;padding:8px;transform-origin:0 0;transform:translate(0px,0px) scale(1);will-change:transform;}
#pdf-pages canvas{display:block;box-shadow:0 1px 8px rgba(70,88,110,.18);}
#pdf-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:rgba(233,237,242,.94);color:#66788a;font-size:13px;z-index:5;}
#pdf-overlay.hidden{display:none;}
#pdf-overlay .spin{width:28px;height:28px;border:3px solid #cbd5df;border-top-color:#7f8fa0;border-radius:50%;animation:pdfSpin .7s linear infinite;}
#pdf-overlay.err .spin{display:none;}
#pdf-overlay.err{color:#e88;}
@keyframes pdfSpin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.7;transform:scale(1.05);}}
#panel-collapsed-label{
  display:none;
  writing-mode:vertical-rl;
  font-size:11px;font-weight:700;color:var(--muted);
  padding:12px 0;text-align:center;letter-spacing:.1em;
}

/* ── PDF拡大モード（Flexbox幅伸縮方式） ── */
#left-col{
  width:72%;
  display:flex;flex-direction:column;height:100%;overflow:hidden;flex-shrink:0;
  transition:width 0.3s ease;
}
#panel{
  width:28%;
  flex-shrink:0;
  background:#f4f6f8;border-left:1px solid #d3dbe5;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:-2px 0 10px rgba(70,88,110,.08);
  height:100%;
  transition:width 0.3s ease;
  position:relative;z-index:1;
}

/* 拡大時：地図を縮めてPDFを縦に最大化 */
#map{
  height:38%;
  flex-shrink:0;
  margin-left:350px;
  width:calc(100% - 350px);
  transition:height 0.3s ease;
  overflow:hidden;
}
#main.is-pdf-expanded #left-col{ width:72%; } /* 横幅は変えない */
#main.is-pdf-expanded #panel{ width:28%; }    /* 横幅は変えない */
#main.is-pdf-expanded #map{ height:4%; }      /* 地図をほぼ折りたたむ */
#main.is-pdf-expanded #panel > *{ opacity:1; pointer-events:auto; } /* パネルはそのまま */

/* ── 拡大トグルボタン ── */
#btn-pdf-expand{
  position:absolute;top:8px;right:8px;z-index:100;
  margin-left:auto;
  background:#dfe6ee;border:1px solid #c8d2df;color:#425466;
  border-radius:4px;padding:4px 12px;font-size:12px;font-weight:800;cursor:pointer;
  box-shadow:0 1px 4px rgba(70,88,110,.16);
  transition:background .15s,border-color .15s,color .15s;
}
#btn-pdf-expand:hover{background:#d3dce7;}
#panel-collapsed-label{display:none;}
#sidebar{
  position:fixed;
  top:var(--hh);left:0;
  height:calc((100vh - var(--hh)) * 0.38);
  width:350px;
  background:#f4f6f8;
  border-right:1px solid #d3dbe5;
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:2px 0 10px rgba(70,88,110,.10);
  z-index:600;
  transition:height 0.3s ease, transform .25s cubic-bezier(.32,.72,0,1);
  transform:translateX(0);
}
/* 拡大時：PDFがfixedになりleft-colが地図のみになるのでサイドバーも全高に */
body.pdf-expanded #sidebar{
  height:calc(100vh - var(--hh));
}
#sidebar.collapsed{
  transform:translateX(-198px);
}
#sidebar.collapsed #sb-body{ pointer-events:none; }
#sb-toggle{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:8px 10px;cursor:pointer;
  font-size:11px;font-weight:800;color:#526577;
  border-bottom:1px solid #d3dbe5;
  background:#edf1f5;user-select:none;
}
#sb-toggle:hover{background:#e1e7ee;}
#sb-toggle-label{ white-space:nowrap;overflow:hidden; }
#sb-body{flex:1;overflow-y:auto;padding:0;background:#f4f6f8;min-height:0;}






.sb-item{
  display:block;width:100%;text-align:left;border:none;background:#f8fafc;
  padding:5px 8px 5px 14px;font-size:14px;font-weight:700;line-height:1.5;
  color:var(--text);cursor:pointer;font-family:'Noto Sans JP',sans-serif;
  border-bottom:1px solid #dfe5ec;
  transition:background .1s;
}
.sb-men{font-size:11px;font-weight:700;color:#fff;padding:1px 5px;border-radius:3px;margin-right:5px;vertical-align:middle;display:inline-block;}
.sb-item:hover{ background:#edf1f5; }
.sb-item.active{background:#edf1f5;font-weight:800;border-left:2px solid #9aa8b6;padding-left:12px;}
.sb-item.playing{background:#edf1f5;font-weight:800;border-left:2px solid #7f8fa0;padding-left:12px;}

#panelHdr{
  padding:10px 12px 8px;border-bottom:1px solid #d3dbe5;
  background:#edf1f5;flex-shrink:0;
}
#panelTitle{font-size:13px;font-weight:900;color:var(--text);margin-bottom:2px;}
#panelSub{font-size:11px;color:var(--muted);font-weight:500;}
#panelBody{flex:1;overflow-y:auto;padding:8px;background:#f4f6f8;}
#panelBody::-webkit-scrollbar{width:4px;}
#panelBody::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.panel-action-btn{
  padding:4px 9px;border-radius:14px;border:1px solid #c8d2df;
  background:#f5f7fa;color:#526577;font-size:11px;font-weight:800;
  font-family:inherit;cursor:pointer;transition:background .15s,color .15s,border-color .15s;
}
.panel-action-btn:hover{background:#e1e7ee;color:#34495e;border-color:#b8c4d1;}

/* ── ARTICLE CARDS ── */
.ac{
  background:#f8fafc;border-radius:0;
  border:none;border-bottom:1px solid #dfe5ec;
  margin-bottom:0;overflow:hidden;cursor:pointer;
  transition:background .12s;
}
.ac:active{transform:scale(.998);}
.ac:hover{background:#edf1f5;}
.ac.open{background:#f8fafc;border-left:2px solid #9aa8b6;}
.ct{padding:9px 11px 8px;}
.cm{display:flex;align-items:center;gap:5px;margin-bottom:5px;flex-wrap:wrap;}
.cno{display:none;}
.cpl{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;margin-left:auto;
  max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ctitle{font-size:14px;font-weight:700;line-height:1.5;color:var(--text);padding-left:8px;
  position:sticky;top:0;background:#edf1f5;z-index:10;padding-top:6px;padding-bottom:6px;
  border-bottom:1px solid #d3dbe5;border-left:2px solid #9aa8b6;margin-bottom:4px;}
.ckws{display:flex;flex-wrap:wrap;gap:3px;padding:5px 11px 7px;
  border-top:1px solid #dfe5ec;background:#edf1f5;}
.kw{font-size:10px;padding:2px 7px;border-radius:2px;border:1px solid;font-weight:600;}
.cdet{display:none;padding:3px 11px 11px;}
.ac.open .cdet{display:block;}
.dl{margin-top:8px;}
.dll{font-size:11px;font-weight:400;color:var(--muted);margin-bottom:3px;}
.dlt{font-size:13px;font-weight:400;line-height:1.8;color:var(--text);background:#edf1f5;
  padding:8px 10px;border-left:2px solid #c8d2df;}
.sempty{padding:40px 16px;text-align:center;color:var(--muted);font-size:13px;line-height:1.8;}

/* ── LEAFLET ── */
.leaflet-container{background:#c8ddf0;}
.custom-pin{display:flex;align-items:center;justify-content:center;border-radius:50%;
  border:2.5px solid rgba(255,255,255,.9);font-size:11px;font-weight:900;color:#fff;
  cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.25);}
.leaflet-popup-content-wrapper{background:#fff;border:1.5px solid var(--border);
  border-radius:3px;box-shadow:0 4px 16px rgba(0,0,0,.15);max-width:260px;}
.leaflet-popup-tip{background:#fff;}
.leaflet-popup-content{margin:11px 13px;font-family:'Noto Sans JP',sans-serif;}
.ppc{font-size:11px;margin-bottom:3px;font-weight:700;}
.ppt{font-size:13px;font-weight:800;color:var(--text);line-height:1.4;margin-bottom:5px;}
.ppb{font-size:11px;color:var(--text2);line-height:1.7;}
.leaflet-control-zoom{border:none!important;box-shadow:0 2px 10px rgba(0,40,100,.12)!important;}
.leaflet-control-zoom a{background:rgba(255,255,255,.95)!important;
  border:1px solid var(--border)!important;color:var(--text)!important;
  font-size:16px!important;font-weight:700!important;
  width:36px!important;height:36px!important;line-height:36px!important;}
.active-pin{box-shadow:0 0 0 4px rgba(255,200,0,.8),0 3px 10px rgba(0,0,0,.25)!important;}

/* ── BGM ── */
#bgm-panel{
  position:fixed;right:12px;bottom:12px;z-index:100002;
  background:#f8fafc;border:1px solid #c8d2df;
  border-radius:8px;box-shadow:0 4px 18px rgba(70,88,110,.18);
  width:min(286px,calc(100vw - 24px));max-height:min(46vh,360px);
  font-family:'Noto Sans JP',sans-serif;overflow:hidden;
  transition:width .18s,box-shadow .18s,opacity .18s;
}
#bgm-panel.minimized{width:auto;max-width:180px;opacity:.88;}
#bgm-panel.minimized #bgm-body{display:none;}
#bgm-head{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;cursor:pointer;
  border-bottom:1px solid #d3dbe5;
  background:#edf1f5;
  user-select:none;
}
#bgm-panel.minimized #bgm-head{border-bottom:none;border-radius:8px;}
#bgm-head:hover{background:#e1e7ee;}
#bgm-title{font-size:12px;font-weight:700;color:#425466;flex:1;white-space:nowrap;}
#bgm-toggle-btn{font-size:10px;color:#66788a;padding:1px 5px;border:1px solid #c8d2df;border-radius:2px;background:#f5f7fa;white-space:nowrap;}
#bgm-body{padding:10px;max-height:calc(min(46vh,360px) - 36px);overflow:auto;}
#bgm-now-playing{font-size:11px;color:#66788a;margin-bottom:8px;line-height:1.5;min-height:28px;}

let ALL_ARTICLES = [];

/* ═══════ ユーティリティ関数 ═══════ */
function ttsEsc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function preserveLines(text) {
  if (!text) return '';
  return ttsEsc(text).replace(/\r?\n/g, '<br>');
}

/* ═══════ CONFIG ═══════ */
// DATESはdata.jsonの日付から自動生成
let DATES = [];
function buildDatesFromData(){
  const COLORS = ['#b71c1c','#1b5e20','#1565c0','#4a148c','#e65100','#00695c','#6a1b9a','#0d47a1','#880e4f','#33691e'];
  const dateSet = [...new Set(ALL_ARTICLES.map(a=>a.date))];
  dateSet.sort((a,b)=>{
    const [am,ad]=a.split('/').map(Number);
    const [bm,bd]=b.split('/').map(Number);
    return (bm-am)||(bd-ad);
  });
  DATES = dateSet.map((key,i)=>({ key, label:key, color:COLORS[i%COLORS.length] }));
}
function getDateColor(key){ return (DATES.find(d=>d.key===key)||{}).color || '#607d8b'; }

function xkws(a){
  const t = [a.title, a['内容']||'', a['思惑']||''].join(' ');
  return[
    ['エネルギー',/石油|LNG|原油|ガス|エネルギー|電力|原発|ホルムズ/],
    ['地政学',/中東|ウクライナ|ロシア|防衛|軍|制裁|封鎖|退避|クーデター/],
    ['AI・テック',/AI|人工知能|DX|デジタル|ロボ|エージェント|生成AI/],
    ['経済・金融',/株|銀行|投資|物価|NISA|賃上げ|賃金|上場|仮想通貨|賃料/],
    ['産業',/半導体|自動車|EV|工場|製造|研削盤|光工学|黄リン/],
    ['資源',/レアアース|重要鉱物|南鳥島|供給|経済安保/],
    ['中国',/中国|台湾|全人代|習近平|北京|重慶/],
    ['米国',/アメリカ|米国|トランプ|ワシントン|シリコン/],
    ['スポーツ',/WBC|野球|スキー|卓球|バレー|ジャンプ|フィギュア|ラリー|カーリング/],
    ['社会',/介護|医療|被災|震災|補聴器|精米|選挙|市長/],
  ].filter(([,r])=>r.test(t)).map(([l])=>l).slice(0,3);
}

/* ═══════ RENDER ═══════ */
function cc(cat){ return CAT_CONFIG[cat] || {color:'#607d8b',emoji:'📌'}; }

function getArts(){
  return ALL_ARTICLES.filter(a=>
    a.date===curDate &&
    a.edition===curEd &&
    (curCat===null || a.cat===curCat) &&
    (curGenre===null || getGenre(a.cat)===curGenre)
  );
}

function renderAll(){
  activeArts = getArts();
  renderMarkers();
  renderPanel();
  setTimeout(buildSidebar, 50);
}

function renderMarkers(){
  if(markerCluster){ map.removeLayer(markerCluster); markerCluster=null; }
  Object.values(markers).forEach(m=>{ try{m.remove();}catch(e){} }); markers={};

  markerCluster = L.markerClusterGroup({
    disableClusteringAtZoom: 1,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false
  });

  const bounds = [];
  activeArts.forEach(a=>{
    const c = cc(a.cat);
    const icon = L.divIcon({className:'',
      html:`<div class="custom-pin" style="width:30px;height:30px;background:${c.color};">${({morning:'朝',evening:'夕',regional:'地',plusone:'＋',weekly:'週',saturday:'土'}[a.edition]||'')+Math.floor(a.no)}</div>`,
      iconSize:[30,30], iconAnchor:[15,15]});
    const m = L.marker([a.lat,a.lng], {icon, title:a.title});
    const kws = (a.kws||xkws(a)).map(k=>
      `<span style="font-size:10px;padding:1px 6px;border-radius:8px;border:1px solid ${c.color}55;color:${c.color};background:${c.color}12;font-weight:600;">${k}</span>`
    ).join(' ');
    m.bindPopup(`
      <div class="ppc" style="color:${c.color}">${c.emoji} ${a.cat}</div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:4px;">📍 ${a.place}</div>
      <div class="ppt">${a.title}</div>
      <div class="ppb">${(a['内容']||'').slice(0,80)}…</div>
      ${kws?`<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:3px;">${kws}</div>`:''}
    `, {maxWidth:260});
    m.on('click', ()=>{
      highlightCard(a.id);
      openPanel();
      sbSetActive(a.id);
      setTimeout(()=>{
        const btn = document.getElementById('despina-btn-'+a.id);
        despinaSpeak(a.id, btn);
      }, 400);
    });
    markerCluster.addLayer(m);
    markers[a.id] = m;
    bounds.push([a.lat, a.lng]);
  });

  map.addLayer(markerCluster);
  if(bounds.length > 0){
    try{ map.fitBounds(bounds, {padding:[40,40], maxZoom:10, animate:false}); }catch(e){}
  }
}

function toggleCard(el, id){
  const wasOpen = el.classList.contains('open');
  document.querySelectorAll('.ac.open').forEach(c=>c.classList.remove('open'));
  if(!wasOpen){
    el.classList.add('open');
    sbSetActive(id);
    const lat = parseFloat(el.dataset.lat);
    const lng = parseFloat(el.dataset.lng);
    if(!isNaN(lat) && !isNaN(lng)){
      map.invalidateSize();
      setTimeout(()=>{ map.setView([lat, lng], 8, {animate:false}); }, 80);
    }
  }
}

function highlightCard(id){
  document.querySelectorAll('.ac.open').forEach(c=>c.classList.remove('open'));
  const el = document.getElementById('card-'+id);
  if(el){
    el.classList.add('open');
    el.scrollIntoView({behavior:'smooth', block:'nearest'});
  }
}

}
function openPanel(){
  if(window.innerWidth <= 640){

    document.getElementById('panel').className = 'open';

}

// 記事のカテゴリからジャンルキーを返す
function getGenre(cat){
  // 直接マッチ
  for(const [gkey, g] of Object.entries(GENRE_MAP)){
    if(g.cats.has(cat)) return gkey;
  }
  // 「N面（キーワード）」形式の場合、括弧内で判定
  const inner = (cat.match(/[（(]([^）)]+)[）)]/) || [])[1] || cat;
  const kws = inner.split(/[・\/\s]+/);
  const KEYWORD_GENRE = {
    '国際':'国際','アジア':'国際','グローバル':'国際',
    '政治':'政治','外交':'政治','社説':'政治','オピニオン':'政治',
    '経済':'経済・金融','金融':'経済・金融','市場':'経済・金融','マーケット':'経済・金融','商品':'経済・金融','投資':'経済・金融','経済教室':'経済・金融',
    'ビジネス':'産業・企業','サイエンス':'産業・企業','ビジュアル':'産業・企業',
    '社会':'生活・社会','文化':'文化・その他','スポーツ':'スポーツ',
    '総合':'政治','特集':'文化・その他',
  };
  for(const kw of kws){
    for(const [key, genre] of Object.entries(KEYWORD_GENRE)){
      if(kw.includes(key)) return genre;
    }
  }
  return '文化・その他';
}

let curGenre = null; // ジャンルフィルター（nullで全件）

function buildCatChips(){
  const wrap = document.getElementById('catChips');
  wrap.innerHTML = '';
  const arts = ALL_ARTICLES.filter(a=>a.date===curDate && a.edition===curEd);
  const genreCount = {};
  arts.forEach(a=>{
    const g = getGenre(a.cat);
    genreCount[g] = (genreCount[g]||0) + 1;
  });

  Object.entries(GENRE_MAP).forEach(([gkey, g])=>{
    const cnt = genreCount[gkey];
    if(!cnt) return;
    const chip = document.createElement('div');
    const on = curGenre === gkey;
    chip.className = 'cchip' + (on ? ' on' : '');
    chip.style.borderColor = on ? '#c3ceda' : g.color+'55';
    chip.style.color = on ? '#34495e' : g.color;
    chip.style.background = on ? '#d7dee7' : g.color+'12';
    chip.textContent = `${g.emoji} ${gkey} ${cnt}`;
    chip.onclick = ()=>{
      curGenre = curGenre === gkey ? null : gkey;
      curCat = null;
      buildCatChips();
      renderAll();
      if(curGenre){
        const filtered = activeArts;
        if(filtered.length){
          try{ map.fitBounds(L.latLngBounds(filtered.map(a=>[a.lat,a.lng])).pad(.2),{maxZoom:9}); }catch(e){}
        }
      } else {
        map.setView([36,138],5,{animate:true});
      }
    };
    wrap.appendChild(chip);
  });
}

function openSearch(){
  srchMkrs.forEach(m=>m.remove()); srchMkrs=[];
  document.getElementById('srchOvl').classList.add('vis');
  // 日付セレクトを初期化
  const allDates = [...new Set(ALL_ARTICLES.map(a=>a.date))].sort((a,b)=>{
    const [am,ad]=a.split('/').map(Number), [bm,bd]=b.split('/').map(Number);
    return (am-bm)||(ad-bd);
  });
  ['srchFrom','srchTo'].forEach((id,i)=>{
    const sel = document.getElementById(id);
    if(sel){
      sel.innerHTML = allDates.map(d=>`<option value="${d}">${d}</option>`).join('');
      sel.value = i===0 ? allDates[0] : allDates[allDates.length-1];
    }
  });
  buildSrchChips();
  setTimeout(()=>document.getElementById('srchIn').focus(),100);
}
function closeSearch(){
  document.getElementById('srchOvl').classList.remove('vis');
  srchMkrs.forEach(m=>m.remove()); srchMkrs=[];
}
function buildSrchChips(){
  const w=document.getElementById('srchChips'); w.innerHTML='';
  DATES.forEach(d=>{
    const c=document.createElement('div');
    c.className='sch'+(srchDates.has(d.key)?' on':'');
    c.style.borderColor=d.color;
    if(srchDates.has(d.key)) c.style.background=d.color;
    else c.style.color=d.color;
    c.textContent=d.label;
    c.onclick=()=>{
      if(srchDates.has(d.key)) srchDates.delete(d.key); else srchDates.add(d.key);
      if(!srchDates.size) srchDates=new Set(DATES.map(d=>d.key));
      buildSrchChips(); srchLive();
    };
    w.appendChild(c);
  });
}
function norm(s){ return String(s||'').toLowerCase(); }
function hlText(txt, terms){
  let o=String(txt||'');
  terms.forEach(t=>{ o=o.replace(new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>'); });
  return o;
}
function srchLive(){
  const q=document.getElementById('srchIn').value.trim();
  const res=document.getElementById('srchRes');
  srchMkrs.forEach(m=>m.remove()); srchMkrs=[];
  if(!q){ res.innerHTML='<div class="sr-empty">キーワードを入力してください</div>'; return; }

  // 検索範囲を決定
  const rangeVal = (document.querySelector('input[name="srchRange"]:checked')||{}).value || 'today';
  let targetDates;
  if(rangeVal==='all'){
    targetDates = null; // null = 全期間
  } else if(rangeVal==='range'){
    const from = document.getElementById('srchFrom')?.value;
    const to   = document.getElementById('srchTo')?.value;
    const allDates = DATES.map(d=>d.key);
    const fi = allDates.indexOf(from), ti = allDates.indexOf(to);
    const sorted = fi<=ti ? allDates.slice(fi,ti+1) : allDates.slice(ti,fi+1);
    targetDates = new Set(sorted);
  } else {
    targetDates = srchDates; // 今日
  }

  const terms=q.split(/[\s\u3000,、]+/).filter(Boolean).map(norm);
  const scored=[];
  ALL_ARTICLES.forEach(a=>{
    if(targetDates && !targetDates.has(a.date)) return;
    let sc=0;
    [[a.title,10],[a.cat,6],[a.orig_cat||'',4],[a['内容'],4],[a['思惑'],3],[a['影響'],3],
     [a['理解'],2],[a.place,5],[a.kws_raw||'',4],[a.men||'',1]]
     .forEach(([f,w])=>terms.forEach(t=>{ if(norm(f).includes(t)) sc+=w; }));
    if(sc>0) scored.push({...a,_sc:sc});
  });
  scored.sort((a,b)=>b._sc-a._sc);

  const badge = document.getElementById('srchResultBadge');
  if(badge) badge.textContent = scored.length ? `${scored.length}件` : '';

  if(!scored.length){ res.innerHTML='<div class="sr-empty">😔 一致する記事が見つかりませんでした</div>'; return; }
  res.innerHTML=scored.map(a=>{
      const dc=getDateColor(a.date)||'#546e7a';
      const edL={morning:'朝刊',evening:'夕刊',regional:'地方版',plusone:'プラスワン'}[a.edition]||a.edition;
      const dl=DATES.find(d=>d.key===a.date)?.label||a.date;
      const snip=(a['内容']||'').slice(0,60)+((a['内容']||'').length>60?'…':'');
      return `<div class="sr" onclick="srchJump('${a.gid}',${a.lat},${a.lng})">
        <div class="sr-top">
          <span class="sr-badge" style="background:${dc}">${dl} ${edL}</span>
          <span class="sr-cat" style="color:${cc(a.cat).color}">${cc(a.cat).emoji} ${hlText(a.cat,terms)}</span>
          <span class="sr-pl">📍 ${hlText(a.place,terms)}</span>
        </div>
        <div class="sr-ttl">${hlText(a.title,terms)}</div>
        <div class="sr-snip">${hlText(snip,terms)}</div>
      </div>`;
    }).join('');
  const locMap={};
  scored.forEach(a=>{ const k=a.lat+'_'+a.lng; if(!locMap[k])locMap[k]=[]; locMap[k].push(a); });
  const bounds=[];
  Object.values(locMap).forEach(grp=>{
    const a=grp[0]; const dc=getDateColor(a.date)||'#546e7a'; const cnt=grp.length; const sz=cnt>1?38:30;
    const icon=L.divIcon({className:'',
      html:`<div class="custom-pin" style="width:${sz}px;height:${sz}px;background:${dc};box-shadow:0 0 0 3px rgba(255,200,0,.8),0 3px 10px rgba(0,0,0,.25);">${cnt>1?cnt:'★'}</div>`,
      iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
    const mk=L.marker([a.lat,a.lng],{icon});
    const popup=grp.map(x=>{
      const dl=DATES.find(d=>d.key===x.date)?.label||x.date;
      return `<div style="border-left:3px solid ${getDateColor(x.date)};padding-left:7px;margin-bottom:5px;">
        <span style="font-size:10px;font-weight:800;background:${getDateColor(x.date)};color:#fff;padding:1px 5px;border-radius:5px;">${dl} ${x.edition==='evening'?'夕刊':'朝刊'}</span>
        <div style="font-size:12px;font-weight:800;margin-top:3px;">${hlText(x.title,terms)}</div>
      </div>`;
    }).join('');
    mk.bindPopup(`<div style="font-size:10px;color:#3a5268;font-weight:700;margin-bottom:5px;">📍 ${a.place}</div>${popup}`,{maxWidth:260});
    mk.addTo(map); srchMkrs.push(mk); bounds.push([a.lat,a.lng]);
  });
  if(bounds.length){ try{ map.fitBounds(L.latLngBounds(bounds).pad(.15),{maxZoom:10}); }catch(e){} }
}
function srchJump(gid,lat,lng){
  const art=ALL_ARTICLES.find(a=>a.gid===gid);
  closeSearch();
  map.setView([lat,lng],9,{animate:true});
  if(art){
    if(art.date!==curDate||art.edition!==curEd){
      curDate=art.date; curEd=art.edition; curCat=null;
      updateDateTabs(); buildEdWrap(); buildCatChips(); renderAll();
    }
    openPanel();
    setTimeout(()=>{ highlightCard(art.id); },500);
  }
}

function shareArticle(gid){
  const url = location.origin + location.pathname + '?article=' + encodeURIComponent(gid);

        };
      }
    }, 800);
  }, 600);
}

// ── プリキャッシュ（オフライン用音声事前取得） ──
let precaching = false;
async function startPrecache(){
  if(precaching) return;
  const arts = ALL_ARTICLES.filter(a => a.date===curDate && a.edition===curEd);
  if(!arts.length){ alert('記事がありません'); return; }
  const btn = document.getElementById('precacheBtn');
  precaching = true;
  btn.style.cssText += 'background:#1565c0;color:#fff;border-color:#1565c0;';
  const texts = [];
  arts.forEach(a => {
    if(a.men)    texts.push(a.men);
    if(a.title)  texts.push(a.title + '。');
    (a['内容']||'').split(/(?<=[。！？])\s*/).filter(s=>s.trim().length>3).forEach(s=>texts.push(s));
    if(a['思惑'])    texts.push(a['思惑']);
    if(a['理解'])    texts.push(a['理解']);
    if(a.quiz_q) texts.push('クイズです。' + a.quiz_q);
    if(a.quiz_a) texts.push('正解は。' + a.quiz_a);
  });
  const total = texts.length;
  let done = 0, errors = 0;
  for(const text of texts){
    if(!precaching) break;
    try{ await despinaFetchAudio(text); done++; }
    catch(e){ errors++; await new Promise(r=>setTimeout(r,500)); }
    btn.textContent = `📥 ${Math.round(done/total*100)}% (${done}/${total})`;
    await new Promise(r=>setTimeout(r,80));
  }
  precaching = false;
  btn.textContent = errors > 0 ? `✅ 完了(エラー${errors}件)` : '✅ 保存完了';
  btn.style.background = '#2e7d32'; btn.style.borderColor = '#2e7d32';
  setTimeout(()=>{ btn.textContent='📥 音声保存'; btn.style.cssText=''; }, 3000);
}

ALL_ARTICLES = [];
fetch('/data.json')
  .then(r=>r.json())
  .then(data=>{
    ALL_ARTICLES = Array.isArray(data) ? data : (data.articles || []);
    ALL_ARTICLES.forEach(a=>{ a.kws = xkws(a); });
    buildDatesFromData();
    buildDateTabs();
    setHdrHeight();
    (function(){
      const now = new Date();
      const jst = new Date(now.getTime() + 9*60*60*1000);
      const month = jst.getUTCMonth() + 1;
      const day   = jst.getUTCDate();
      const hour  = jst.getUTCHours();
      const todayKey = month + '/' + day;
      function hasArts(dateKey, ed){ return ALL_ARTICLES.some(a=>a.date===dateKey&&a.edition===ed); }
      function hasAnyArts(dateKey){ return ALL_ARTICLES.some(a=>a.date===dateKey); }
      let startDate = DATES[0].key;
      let startEd   = 'morning';

      // 14:30以降（JST）は夕刊優先
      const minute = jst.getUTCMinutes();
      const isAfterEvening = hour > 14 || (hour === 14 && minute >= 30);

      function bestEd(dateKey){
        const hasMor = hasArts(dateKey,'morning');
        const hasEve = hasArts(dateKey,'evening');
        if(isAfterEvening && hasEve) return 'evening';
        if(hasMor) return 'morning';
        if(hasEve) return 'evening';
        return 'morning';
      }

      if(hasAnyArts(todayKey)){
        startDate = todayKey;
        startEd = bestEd(todayKey);
      } else {
        // 今日データなし→最新登録日
        startEd = bestEd(DATES[0].key);
      }
      curEd = startEd;
      selectDate(startDate);
      pdfLoadForDate(startDate, startEd);
    })();
    buildSidebar();
    setTimeout(setHdrHeight, 100);
    setTimeout(()=>{ map.invalidateSize(); }, 600);
    setTimeout(openArticleFromUrl, 800);
  })
  .catch(e=>console.error('data.json読み込みエラー',e));

let ttsPlayingId = null;

function syncSpeedBtn(){
  document.querySelectorAll('.tts-spd-btn').forEach(b=>{
    b.classList.remove('active');
    const m = b.getAttribute('onclick') && b.getAttribute('onclick').match(/ttsSetSpeed\(([0-9.]+)/);
    if(m && parseFloat(m[1]) === ttsRate) b.classList.add('active');
  });
}
setTimeout(syncSpeedBtn, 300);

function ttsSetSpeed(rate, btn){
  ttsRate = rate;
  document.querySelectorAll('.tts-spd-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(ttsPlayingId){
    const currentId = ttsPlayingId;
    speechSynthesis.cancel();
    setTimeout(()=>{
      const b = document.getElementById('tts-btn-'+currentId);
      ttsSpeakCard(currentId, b, ttsAutoPlay);
    }, 100);
  }
  // Google TTS（despinaSpeak）再生中の場合も再起動
  if(typeof despinaPlayingId !== 'undefined' && despinaPlayingId){
    const currentId = despinaPlayingId;
    despinaStop();
    setTimeout(()=>{
      const b = document.getElementById('despina-btn-'+currentId);
      despinaSpeak(currentId, b);
    }, 150);
  }
}

const TTS_BAD = ['ichiro','ayumi','haruka','sayaka'];
function ttsBad(name){ return TTS_BAD.some(b=>name.toLowerCase().includes(b)); }

function ttsGetJaVoice(){
  const voices = speechSynthesis.getVoices();
  if(ttsSelectedVoiceName){
    const sel = voices.find(v=>v.name===ttsSelectedVoiceName);
    if(sel) return sel;
  }
  const ja = voices.filter(v=>
    v.lang==='ja-JP'||v.lang.startsWith('ja-')||
    v.name.toLowerCase().includes('japanese')||
    v.name.toLowerCase().includes('nanami')||
    v.name.toLowerCase().includes('otoya')||
    v.name.toLowerCase().includes('kyoko')
  );
  const pool = ja.length ? ja : voices;
  return pool.find(v=>v.name.toLowerCase().includes('nanami')&&v.name.toLowerCase().includes('online'))||
         pool.find(v=>v.name.toLowerCase().includes('nanami'))||
         pool.find(v=>v.name.toLowerCase().includes('otoya'))||
         pool.find(v=>!ttsBad(v.name))||
         pool.find(v=>v.name.toLowerCase().includes('kyoko'))||
         pool[0]||null;
}

function ttsSetVoice(name, el){
  ttsSelectedVoiceName = name;
  document.querySelectorAll('.tts-vdrop-item').forEach(b=>b.classList.remove('selected'));
  if(el) el.classList.add('selected');
  const btn = document.getElementById('tts-vdrop-btn');
  if(btn && el) btn.textContent = el.textContent;
  const list = document.getElementById('tts-vdrop-list');
  if(list) list.classList.remove('open');
  speechSynthesis.cancel();
  const voices = speechSynthesis.getVoices();
  const v = voices.find(x=>x.name===name);
  if(!v) return;
  const t = new SpeechSynthesisUtterance('この声です。');
  t.voice = v; t.lang = v.lang; t.rate = ttsRate;
  speechSynthesis.speak(t);
}

function ttsPopulateVoiceSelect(){
  const list = document.getElementById('tts-vdrop-list');
  if(!list) return;
  const allVoices = speechSynthesis.getVoices();
  if(!allVoices.length) return;
  const jaVoices = allVoices.filter(v=>
    v.lang==='ja-JP'||v.lang.startsWith('ja')||
    /nanami|otoya|kyoko|ayumi|haruka|ichiro|keita|mizuki|japanese/i.test(v.name)
  );
  const pool = jaVoices.length ? jaVoices : allVoices;
  if(!ttsSelectedVoiceName){
    const pick =
      pool.find(v=>/nanami/i.test(v.name)&&/online/i.test(v.name))||
      pool.find(v=>/nanami/i.test(v.name))||
      pool.find(v=>/otoya/i.test(v.name))||
      pool.find(v=>!ttsBad(v.name))||
      pool[0];
    if(pick) ttsSelectedVoiceName = pick.name;
  }
  list.innerHTML = pool.map(v=>{
    const bad = ttsBad(v.name);
    const label = v.name.replace(/Microsoft /,'').replace(/\(ja-JP\)/g,'').replace(/\s*\(.*?\)\s*/g,' ').trim()+(bad?' ✕':'');
    const sel = v.name===ttsSelectedVoiceName?' selected':'';
    const cls = bad?' tts-vdrop-bad':'';
    return `<button class="tts-vdrop-item${sel}${cls}" onclick="ttsSetVoice('${v.name.replace(/'/g,"\\'")}',this)">${label}</button>`;
  }).join('');
  const btn = document.getElementById('tts-vdrop-btn');
  if(btn){
    const cur = pool.find(v=>v.name===ttsSelectedVoiceName);
    if(cur) btn.textContent = cur.name.replace(/Microsoft /,'').replace(/\(ja-JP\)/g,'').replace(/\s*\(.*?\)\s*/g,' ').trim();
  }
}

function ttsToggleVoiceList(e){
  e.stopPropagation();

let sbCollapsed = false;

function buildSidebar(){
  const body = document.getElementById('sb-body');
  if(!body) return;
  body.innerHTML = '';
  const arts = (typeof activeArts !== 'undefined' && activeArts.length)
    ? activeArts
    : ALL_ARTICLES.filter(a=>a.date===curDate&&a.edition===curEd);
  if(!arts||!arts.length){
    body.innerHTML = '<div style="padding:8px;font-size:11px;color:#666;text-align:center;">📋 記事を選択してください</div>';
    return;
  }
  arts.forEach(a=>{
    const edPrefix = {morning:'朝', evening:'夕', regional:'地', plusone:'＋', weekly:'週', saturday:'土'}[a.edition] || '';
    const noStr = edPrefix + String(Math.floor(a.no)).padStart(2,'0');
    // 番号バッジ（目次では控えめなグレー）
    const noHtml = `<span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#dfe6ee;color:#526577;font-size:10px;font-weight:900;flex-shrink:0;margin-right:5px;border:1px solid #c8d2df;">${noStr}</span>`;
    // 面バッジ（グレー地の四角）
    const menHtml = a.men ? `<span style="display:inline-block;background:#e0e0e0;color:#555;font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;margin-right:4px;flex-shrink:0;">${a.men}</span>` : '';
    const btn = document.createElement('button');
    btn.className = 'sb-item';
    btn.id = 'sb-item-'+a.id;
    btn.style.display = 'flex';
    btn.style.alignItems = 'center';
    btn.innerHTML = noHtml + menHtml + `<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${a.title||''}</span>`;
    btn.title = a.title;
    btn.onclick = ()=> sbSelectArticle(a.id);
    body.appendChild(btn);
  });
}

function sbSelectArticle(id){
  curCat = null;
  buildCatChips();
  renderAll();
  openPanel();
  document.querySelectorAll('.ac.open').forEach(c=>c.classList.remove('open'));
  const panelBody = document.getElementById('panelBody');
  const card = document.querySelector('.ac[data-id="'+id+'"]');
  if(card && panelBody){
    card.classList.add('open');
    panelBody.insertBefore(card, panelBody.firstChild);
    panelBody.scrollTop = 0;
  }
  sbSetActive(id);
  // PDF連動
  const artObj = ALL_ARTICLES.find(x=>String(x.id)===String(id));
  if(artObj) pdfJumpToArticle(artObj);
  if(card){
    const lat = parseFloat(card.dataset.lat);
    const lng = parseFloat(card.dataset.lng);
    if(!isNaN(lat)&&!isNaN(lng)){
      map.invalidateSize();
      setTimeout(()=>{ map.setView([lat,lng],8,{animate:false}); }, 80);
    }
  }
  setTimeout(()=>{
    const btn = document.getElementById('despina-btn-'+id);
    if(btn){ despinaSpeak(id, btn); }
    else { setTimeout(()=>{ const btn2=document.getElementById('despina-btn-'+id); despinaSpeak(id,btn2); },300); }
  }, 400);
}

function sbSetActive(id){
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  const el = document.getElementById('sb-item-'+id);
  if(el){ el.classList.add('active'); el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
}

function togglePdfExpand(){
  const wrap = document.getElementById('pdf-wrap');
  if(!wrap) return;
  const isExpanded = wrap.classList.toggle('expanded-overlay');
  document.body.classList.toggle('pdf-expanded', isExpanded);
  const icon = document.getElementById('expand-icon');
  if(icon){ icon.textContent = isExpanded ? '◀ 戻す' : '⛶ 拡大'; }
  setTimeout(async ()=>{
    if(typeof renderPage === 'function' && typeof pageNum !== 'undefined'){ renderPage(pageNum); }
    window.dispatchEvent(new Event('resize'));
    // PDF.js再描画
    if(window.pdfDoc){
      pdfUserScale = null;
      if(window._pdfResetTransform) window._pdfResetTransform();
      const {partIdx, localPage} = calculatePdfLocation(pdfGlobalPage);
      await pdfDrawSinglePage(partIdx, localPage);
      pdfHideOverlay();
    }
  }, 310);
}
window.pdfToggleExpand = togglePdfExpand;

function ttsResetHLById(pid){
  const a = activeArts.find(x=>String(x.id)===String(pid));
  if(!a) return;
  const te  = document.getElementById('tts-title-'+pid);
  const ne  = document.getElementById('tts-naiyou-'+pid);
  const re2 = document.getElementById('tts-rikai-'+pid);
  const oe  = document.getElementById('tts-omowaku-'+pid);
  if(te)  te.innerHTML  = (a.men?`<span style="font-size:10px;font-weight:900;margin-right:4px;">${a.men}</span>`:'')+preserveLines(a.title||'');

  if(re2) re2.innerHTML = preserveLines(a['理解']);
  if(oe)  oe.innerHTML  = preserveLines(a['思惑']);
}

function ttsStop(stopAuto=true){
  if(stopAuto) ttsAutoPlay = false;
  speechSynthesis.cancel();
  if(ttsPlayingId){
    const btn = document.getElementById('tts-btn-'+ttsPlayingId);
    if(btn){ btn.textContent='🔊 読み上げ'; btn.classList.remove('playing'); }
    ttsResetHLById(ttsPlayingId);
    ttsPlayingId = null;
  }
  document.querySelectorAll('.tts-btn.playing').forEach(b=>{ b.textContent='🔊 読み上げ'; b.classList.remove('playing'); });
}

function ttsGetIdx(id){ return activeArts.findIndex(x=>String(x.id)===String(id)); }

function ttsMove(dir, id){
  const idx = ttsGetIdx(id);
  if(idx < 0) return;
  const next = activeArts[idx + dir];
  if(!next) return;
  speechSynthesis.cancel();
  const curBtn = document.getElementById('tts-btn-'+id);
  if(curBtn){ curBtn.textContent='🔊 読み上げ'; curBtn.classList.remove('playing'); }
  ttsPlayingId = null;
  ttsOpenCard(next.id);
  setTimeout(()=>{
    const btn = document.getElementById('despina-btn-'+next.id);
    despinaSpeak(next.id, btn);
  }, 150);
}

function ttsOpenCard(id){
  document.querySelectorAll('.ac.open').forEach(c=>c.classList.remove('open'));
  const card = document.querySelector('.ac[data-id="'+id+'"]');
  if(card){
    card.classList.add('open');
    card.scrollIntoView({behavior:'smooth', block:'nearest'});
    openPanel();
    const lat = parseFloat(card.dataset.lat);
    const lng = parseFloat(card.dataset.lng);
    if(!isNaN(lat)&&!isNaN(lng)){
      map.invalidateSize();
      setTimeout(()=>{ map.setView([lat,lng],8,{animate:false}); }, 80);
    }
  }
}

function ttsSpeakCard(id, btn, autoNext=true){
  id = String(id);
  if(String(ttsPlayingId)===id){ ttsStop(); return; }
  ttsStop();
  ttsAutoPlay = autoNext;
  const a = activeArts.find(x=>String(x.id)===String(id))||ALL_ARTICLES.find(x=>String(x.id)===String(id));
  if(!a) return;
  const card = document.querySelector('.ac[data-id="'+id+'"]');
  if(card){
    document.querySelectorAll('.ac.open').forEach(c=>c.classList.remove('open'));
    card.classList.add('open');
    card.scrollIntoView({behavior:'smooth', block:'nearest'});
    openPanel();
    const lat=parseFloat(card.dataset.lat), lng=parseFloat(card.dataset.lng);
    if(!isNaN(lat)&&!isNaN(lng)){ map.invalidateSize(); setTimeout(()=>map.setView([lat,lng],13,{animate:true}),80); }
  }
  const naiyouText=a['内容']||'', rikaiText=a['理解']||'', omowakuText=a['思惑']||'';
  const menText=a.men||'', titleText2=a.title, titlePart=titleText2+'。', SEP='　';
  const naiyouStart=titlePart.length+SEP.length, naiyouEnd=naiyouStart+naiyouText.length;
  const rikaiLabel='理解すべき内容。';
  const rikaiStart=naiyouEnd+(naiyouText?SEP.length:0)+(rikaiText?rikaiLabel.length:0);
  const rikaiEnd=rikaiStart+rikaiText.length;
  const omowakuLabel='思惑と狙い。';
  const omowakuStart=rikaiEnd+(rikaiText?SEP.length:0)+(omowakuText?omowakuLabel.length:0);
  const parts=[titlePart];
  if(naiyouText) parts.push(naiyouText);
  if(rikaiText)  parts.push(rikaiLabel+rikaiText);
  if(omowakuText) parts.push(omowakuLabel+omowakuText);
  const text=parts.join(SEP);
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='ja-JP'; utt.rate=ttsRate; utt.pitch=1.0;
  const jaVoice=ttsGetJaVoice(); if(jaVoice) utt.voice=jaVoice;
  ttsPlayingId=String(id);
  pdfJumpToArticle(a);  // PDF連動
  if(btn){ btn.textContent='⏹ 停止'; btn.classList.add('playing'); }
  function startMain(){ speechSynthesis.speak(utt); }
  if(menText){
    const menUtt=new SpeechSynthesisUtterance(menText);
    menUtt.lang='ja-JP'; menUtt.rate=ttsRate; menUtt.pitch=1.0;
    const mv=ttsGetJaVoice(); if(mv) menUtt.voice=mv;
    menUtt.onend=()=>{ if(String(ttsPlayingId)===String(id)) setTimeout(startMain,300); };
    menUtt.onerror=()=>{ startMain(); };
    speechSynthesis.speak(menUtt);
  } else { startMain(); }
  sbSetPlaying(id);
  const titleText=a.title||'', titleEnd=titleText.length;
  let ttsLastZone=null;
  utt.onboundary=(e)=>{
    if(e.name!=='word') return;
    const ci=e.charIndex, cl=e.charLength||3;
    const titleEl=document.getElementById('tts-title-'+id);
    const naiyouEl=document.getElementById('tts-naiyou-'+id);
    const rikaiEl=document.getElementById('tts-rikai-'+id);
    const omowakuEl=document.getElementById('tts-omowaku-'+id);
    function hlEl(el,fullText,localIdx,len,cls){
      if(!el||localIdx<0||localIdx>=fullText.length) return;
      const safeLen=Math.min(len,fullText.length-localIdx);
      el.innerHTML=preserveLines(fullText.slice(0,localIdx))+
        '<span class="'+cls+'">'+preserveLines(fullText.slice(localIdx,localIdx+safeLen))+'</span>'+
        preserveLines(fullText.slice(localIdx+safeLen));
    }
    function resetEl(el,txt){ if(el) el.innerHTML=preserveLines(txt); }
    function scrollToEl(el){ if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
    if(ci<titleEnd){
      if(ttsLastZone!=='title'){
        ttsLastZone='title'; scrollToEl(titleEl);
        resetEl(naiyouEl,naiyouText); resetEl(rikaiEl,rikaiText); resetEl(omowakuEl,omowakuText);
      }
      if(titleEl){
        const safeLen2=Math.min(cl,titleText2.length-ci);
        titleEl.innerHTML=(menText?`<span style="font-size:10px;font-weight:900;margin-right:4px;">${menText}</span>`:'')+
          preserveLines(titleText2.slice(0,ci))+
          '<span class="tts-hl-title">'+preserveLines(titleText2.slice(ci,ci+safeLen2))+'</span>'+
          preserveLines(titleText2.slice(ci+safeLen2));
      }
    } else if(naiyouText&&ci>=naiyouStart&&ci<naiyouEnd){
      if(ttsLastZone!=='naiyou'){
        ttsLastZone='naiyou'; scrollToEl(naiyouEl);
        if(titleEl) titleEl.innerHTML=(menText?`<span style="font-size:10px;font-weight:900;margin-right:4px;">${menText}</span>`:'')+preserveLines(titleText2);
        resetEl(rikaiEl,rikaiText); resetEl(omowakuEl,omowakuText);
      }
      hlEl(naiyouEl,naiyouText,ci-naiyouStart,cl,'tts-hl');
    } else if(rikaiText&&ci>=rikaiStart&&ci<rikaiEnd){
      if(ttsLastZone!=='rikai'){
        ttsLastZone='rikai'; scrollToEl(rikaiEl);
        if(titleEl) titleEl.innerHTML=(menText?`<span style="font-size:10px;font-weight:900;margin-right:4px;">${menText}</span>`:'')+preserveLines(titleText2);
        resetEl(naiyouEl,naiyouText); resetEl(omowakuEl,omowakuText);
      }
      hlEl(rikaiEl,rikaiText,ci-rikaiStart,cl,'tts-hl');
    } else if(omowakuText&&ci>=omowakuStart){
      if(ttsLastZone!=='omowaku'){
        ttsLastZone='omowaku'; scrollToEl(omowakuEl);
        if(titleEl) titleEl.innerHTML=(menText?`<span style="font-size:10px;font-weight:900;margin-right:4px;">${menText}</span>`:'')+preserveLines(titleText2);
        resetEl(naiyouEl,naiyouText); resetEl(rikaiEl,rikaiText);
      }
      hlEl(omowakuEl,omowakuText,ci-omowakuStart,cl,'tts-hl');
    } else {
      if(ttsLastZone!==null){
        ttsLastZone=null;
        if(titleEl) titleEl.innerHTML=(menText?`<span style="font-size:10px;font-weight:900;margin-right:4px;">${menText}</span>`:'')+preserveLines(titleText2);
        resetEl(naiyouEl,naiyouText); resetEl(rikaiEl,rikaiText); resetEl(omowakuEl,omowakuText);
      }
    }
  };
  function saySomething(text,next){
    if(String(ttsPlayingId)!==String(id)) return;
    if(!text){ next(); return; }
    const u=new SpeechSynthesisUtterance(text);
    u.lang='ja-JP'; u.rate=ttsRate; u.pitch=1.0;
    const v=ttsGetJaVoice(); if(v) u.voice=v;
    u.onend=()=>{ if(String(ttsPlayingId)===String(id)) next(); };
    u.onerror=()=>{ finishAll(); };
    speechSynthesis.speak(u);
  }
  function startCountdown(done){
    if(String(ttsPlayingId)!==String(id)){ done(); return; }
    let count=3;
    const countEl=document.getElementById('quiz-count-'+id);
    function tick(){
      if(String(ttsPlayingId)!==String(id)){ done(); return; }
      if(countEl){
        countEl.textContent = `答えまで ${count}`;
        countEl.classList.add('show');
      }
      try{
        const ctx=new(window.AudioContext||window.webkitAudioContext)();
        const osc=ctx.createOscillator(), gain=ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type='square'; osc.frequency.setValueAtTime(1800,ctx.currentTime);
        gain.gain.setValueAtTime(0.2,ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.045);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.045);
        osc.onended=()=>{ try{ ctx.close(); }catch(e){} };
      }catch(e){ /* タブレットでは音が鳴らないことがあるので表示タイマーを優先 */ }
      setTimeout(()=>{
        count--;
        if(count>0) tick();
        else {
          if(countEl){
            countEl.textContent = '答えを表示します';
            setTimeout(()=>countEl.classList.remove('show'), 500);
          }
          done();
        }
      },600);
    }
    tick();
  }
  function finishAll(){
    ttsResetHLById(id);
    if(btn){ btn.textContent='🔊 読み上げ'; btn.classList.remove('playing'); }
    document.querySelectorAll('.tts-btn.playing').forEach(b=>{ b.textContent='🔊 読み上げ'; b.classList.remove('playing'); });
    ttsPlayingId=null;
    if(ttsAutoPlay) ttsPlayNext(id);
  }
  function speakQuiz(){
    const quizQ=(a.quiz_q&&a.quiz_q!=='nan')?a.quiz_q:'';
    const quizA=(a.quiz_a&&a.quiz_a!=='nan')?a.quiz_a:'';
    if(!quizQ){ finishAll(); return; }
    const quizAnsEl=document.getElementById('quiz-ans-'+id);
    const quizBtn=document.getElementById('quiz-btn-'+id);
    const countEl=document.getElementById('quiz-count-'+id);
    if(quizAnsEl) quizAnsEl.classList.remove('show');
    if(quizBtn) quizBtn.style.display='block';
    if(countEl){ countEl.classList.remove('show'); countEl.textContent=''; }
    saySomething('クイズです。',()=>{
      saySomething(quizQ,()=>{
        startCountdown(()=>{
          if(quizAnsEl) quizAnsEl.classList.add('show');
          if(quizBtn) quizBtn.style.display='none';
          setTimeout(()=>{ saySomething('正解は。'+quizA,()=>{ finishAll(); }); },300);
        });
      });
    });
  }
  utt.onend=()=>{ ttsResetHLById(id); speakQuiz(); };
  utt.onerror=()=>{ ttsResetHLById(id); finishAll(); };
}

function ttsPlayAll(){
  const btn=document.getElementById('tts-all-btn');
  if(ttsPlayingId){ ttsStop(); if(btn) btn.textContent='🔊 全読み上げ'; return; }
  if(!activeArts.length) return;
  if(btn) btn.textContent='⏹ 停止';

  setTimeout(()=>{
    const b=document.getElementById('tts-btn-'+activeArts[0].id);

function ttsPlayNext(currentId){
  if(!ttsAutoPlay) return;
  const idx=ttsGetIdx(currentId);
  if(idx<0) return;
  const next=activeArts[idx+1];
  if(!next){ ttsAutoPlay=false; ttsPlayingId=null; return; }
  const ann=new SpeechSynthesisUtterance('次の記事です。');
  ann.lang='ja-JP'; ann.rate=ttsRate;
  const jaVoice=ttsGetJaVoice(); if(jaVoice) ann.voice=jaVoice;
  ann.onend=()=>{
    if(!ttsAutoPlay) return;
    ttsOpenCard(next.id);
    setTimeout(()=>{
      const btn=document.getElementById('tts-btn-'+next.id);
      ttsSpeakCard(next.id,btn,true);
    },150);
  };
  speechSynthesis.speak(ann);
}

function splitSentences(text){
  if(!text) return [];
  const result=[];
  let buf='';
  for(let i=0;i<text.length;i++){
    buf+=text[i];
    if('。！？'.includes(text[i])){ if(buf.trim().length>0) result.push(buf); buf=''; }
  }
  if(buf.trim().length>0) result.push(buf);
  return result.length>0?result:[text];
}

function hlSentence(el, fullText, sentence){
  if(!el) return;
  const idx=fullText.indexOf(sentence);
  if(idx<0){ el.innerHTML=preserveLines(fullText); return; }
  const pre=preserveLines(fullText.slice(0,idx));
  const mid='<span class="tts-hl">'+preserveLines(sentence)+'</span>';
  const post=preserveLines(fullText.slice(idx+sentence.length));
  el.innerHTML=pre+mid+post;
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

async function despinaFetchAudio(text){
  const res=await fetch(
    `https://texttospeech.googleapis.com/v1/text:synthesize?key=${GOOGLE_TTS_KEY}`,
    { method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ input:{text}, voice:{languageCode:'ja-JP',name:'ja-JP-Neural2-B'}, audioConfig:{audioEncoding:'MP3',speakingRate:Math.max(0.25,Math.min(4.0,ttsRate)),pitch:0.0} }) }
  );
  const data=await res.json();
  if(!data.audioContent) throw new Error(JSON.stringify(data));
  const blob=new Blob([Uint8Array.from(atob(data.audioContent),c=>c.charCodeAt(0))],{type:'audio/mpeg'});
  return URL.createObjectURL(blob);
}


// ── TTS再生コア ──
let charHlTimer = null;

/**
 * 音声を再生しながら el 内の fullText 中で sentence の部分を1文字ずつ緑カーソル表示
 * タイトルなど sentence=null の場合は文字トレースしない
 */
function despinaPlayUrl(url, onEnd, sentence, el, fullText){
  if(charHlTimer){ clearInterval(charHlTimer); charHlTimer=null; }
  despinaAudio = new Audio(url);
  despinaAudio.onerror = ()=>{ if(onEnd) onEnd(); };

  despinaAudio.onloadedmetadata = ()=>{
    const duration = despinaAudio.duration;
    // sentence指定あり＆要素あり＆時間取得できた場合のみ1文字ずつ
    if(sentence && el && isFinite(duration) && duration > 0){
      const chars = [...sentence];
      const msPerChar = (duration * 1000) / chars.length;
      let idx = 0;
      // fullText中のsentenceの位置を特定
      const sentStart = fullText.indexOf(sentence);
      const pre  = sentStart >= 0 ? fullText.slice(0, sentStart) : '';
      const post = sentStart >= 0 ? fullText.slice(sentStart + sentence.length) : '';

      charHlTimer = setInterval(()=>{
        if(String(despinaPlayingId) !== String(el.dataset.ttsId || despinaPlayingId)){
          clearInterval(charHlTimer); charHlTimer=null; return;
        }
        const done = chars.slice(0, idx).join('');
        const cur  = chars[idx] || '';
        const rest = chars.slice(idx+1).join('');
        // 読み済み部分は黄マーカー、カーソル文字は緑、残りは通常
        el.innerHTML =
          (pre ? `<span class="tts-hl">${preserveLines(pre+done)}</span>` : (done ? `<span class="tts-hl">${preserveLines(done)}</span>` : '')) +
          (cur ? `<span class="tts-word" id="tts-cursor">${ttsEsc(cur)}</span>` : '') +
          (rest || post ? preserveLines(rest + post) : '');
        // カーソル文字が見えるようスクロール
        const cursor = document.getElementById('tts-cursor');
        if(cursor) cursor.scrollIntoView({behavior:'smooth', block:'nearest', inline:'nearest'});
        idx++;
        if(idx > chars.length){ clearInterval(charHlTimer); charHlTimer=null; }
      }, msPerChar);
    }
    despinaAudio.play().catch(()=>{ if(onEnd) onEnd(); });
  };

  despinaAudio.onended = ()=>{
    if(charHlTimer){ clearInterval(charHlTimer); charHlTimer=null; }
    // 再生終了後：sentenceがあればその部分を黄マーカー＋残りは通常表示
    if(sentence && el && fullText){
      const sentStart = fullText.indexOf(sentence);
      const pre  = sentStart >= 0 ? fullText.slice(0, sentStart + sentence.length) : sentence;
      const post = sentStart >= 0 ? fullText.slice(sentStart + sentence.length) : '';
      el.innerHTML = `<span class="tts-hl">${preserveLines(pre)}</span>${preserveLines(post)}`;
    }
    if(onEnd) onEnd();
  };

  despinaAudio.load();
}

// センテンス列を順番に再生しながら1文字ずつカーソル
async function playSequence(sentences, el, fullText, id, onDone){
  if(!sentences.length){ if(el) el.innerHTML=preserveLines(fullText); onDone(); return; }
  const [first,...rest] = sentences;
  if(String(despinaPlayingId)!==String(id)) return;
  // 全文を常に表示（現在センテンス以前は黄マーカー、以後は通常）
  if(el){
    el.dataset.ttsId = id;
    const sentStart = fullText.indexOf(first);
    const pre  = sentStart >= 0 ? fullText.slice(0, sentStart) : '';
    const post = sentStart >= 0 ? fullText.slice(sentStart + first.length) : '';
    el.innerHTML =
      (pre ? `<span class="tts-hl">${preserveLines(pre)}</span>` : '') +
      preserveLines(first) +
      (post ? preserveLines(post) : '');
  }
  try{
    const url = await despinaFetchAudio(first);
    if(String(despinaPlayingId)!==String(id)) return;
    despinaPlayUrl(url, ()=>{
      if(String(despinaPlayingId)!==String(id)) return;
      if(rest.length===0){
        if(el) el.innerHTML=`<span class="tts-hl">${preserveLines(fullText)}</span>`;
        onDone();
      } else {
        playSequence(rest, el, fullText, id, onDone);
      }
    }, first, el, fullText);
  }catch(e){ console.error(e); despinaStop(); }
}

/* ═══════ PDF Viewer (PDF.js) ═══════ */
const R2_BASE = 'https://pub-d6e8e977da4a4a72b151510d796d981f.r2.dev';

// PDF.js グローバル設定（モジュールスクリプトがセットするのを待つ）
// window.pdfjsLib は <script type="module"> が設定する

// 状態
let pdfParts        = [];
let pdfPartIdx      = 0;
let pdfCurrentYMD     = '';
let pdfCurrentEdCode  = '';
let pdfHasMore        = false;
let pdfDoc      = null;
let pdfUserScale = null; // nullのとき幅自動フィット
const pdfOverlay = document.getElementById('pdf-overlay');
const pdfOvMsg   = document.getElementById('pdf-overlay-msg');

function pdfShowLoading(msg){
  if(!pdfOverlay) return;
  pdfOverlay.className = '';
  if(pdfOvMsg) pdfOvMsg.textContent = msg || '読み込み中…';
}
function pdfShowError(msg){
  if(!pdfOverlay) return;
  pdfOverlay.className = 'err';
  if(pdfOvMsg) pdfOvMsg.textContent = msg || 'エラー';
}
function pdfHideOverlay(){
  if(pdfOverlay) pdfOverlay.className = 'hidden';
}

function pdfLoad(parts, label){
  pdfParts   = parts;
  pdfPartIdx = 0;
  pdfPage    = 1;
  document.getElementById('pdf-label').textContent = '📄 ' + label;
  pdfOpenPart();
}

// ── グローバルページ管理 ──
const PAGES_PER_PART = 5;
let pdfGlobalPage   = 1;  // 通し番号（1始まり）
let pdfTotalPages   = 0;  // 判明している最大ページ数
let pdfDocCache     = {}; // {partIdx: pdfDoc} プリロードキャッシュ
let pdfNavigating   = false; // 多重実行防止

// 通し番号 → {partIdx, localPage}
function calculatePdfLocation(globalPage){
  const partIdx   = Math.floor((globalPage - 1) / PAGES_PER_PART);
  const localPage = ((globalPage - 1) % PAGES_PER_PART) + 1;
  return { partIdx, localPage };
}

function pdfArticleMaxPageForCurrentEd(){
  const edName = {m:'morning', r:'regional', p:'plusone', e:'evening', w:'weekly', s:'saturday'}[pdfCurrentEdCode];
  if(!edName || !Array.isArray(ALL_ARTICLES)) return 0;
  const dateKey = curDate || '';
  let maxPage = 0;
  ALL_ARTICLES.forEach(a => {
    if(a.date !== dateKey || a.edition !== edName) return;
    const raw = a.pdfPage || a.men || '';
    const m = String(raw).match(/(\d+)/);
    if(m) maxPage = Math.max(maxPage, parseInt(m[1], 10) || 0);
  });
  return maxPage;
}

function pdfPartEndPage(startPage){
  const inferredMax = pdfArticleMaxPageForCurrentEd();
  const defaultEnd = startPage + PAGES_PER_PART - 1;
  return inferredMax && startPage <= inferredMax ? Math.min(defaultEnd, inferredMax) : defaultEnd;
}

// パートファイル名を生成（未登録なら追加）
function pdfEnsurePart(partIdx){
  if(!pdfParts[partIdx]){
    const startPage = partIdx * PAGES_PER_PART + 1;
    const endPage   = pdfPartEndPage(startPage);
    pdfParts[partIdx] = `${pdfCurrentYMD}${pdfCurrentEdCode}_P${startPage}-P${endPage}.pdf`;
  }
  return pdfParts[partIdx];
}

// 新形式(-P1-P5)で失敗したら旧形式(_Part1)にフォールバック
async function pdfGetDocWithFallback(partIdx){
  const newName = pdfEnsurePart(partIdx);
  const startPage = partIdx * PAGES_PER_PART + 1;
  const defaultName = `${pdfCurrentYMD}${pdfCurrentEdCode}_P${startPage}-P${startPage + PAGES_PER_PART - 1}.pdf`;
  const oldName = `${pdfCurrentYMD}${pdfCurrentEdCode}_Part${partIdx+1}.pdf`;
  const names = [newName, defaultName, oldName].filter((name, idx, arr) => name && arr.indexOf(name) === idx);
  const urls = names.map(name => R2_BASE+'/'+name);
  for(const url of urls){
    try{
      const task = pdfjsLib.getDocument({url, cMapUrl:'https://cdn.jsdelivr.net/npm/pdfjs-dist@5.6.205/cmaps/', cMapPacked:true});
      const doc = await task.promise;
      pdfDocCache[partIdx] = doc;
      return doc;
    }catch(e){ /* 次を試す */ }
  }
  throw new Error('PDFが見つかりません: '+newName);
}

// PDFドキュメントを取得（キャッシュ優先）
async function pdfGetDoc(partIdx){
  if(pdfDocCache[partIdx]) return pdfDocCache[partIdx];
  let waited = 0;
  while(!window.pdfjsLib && waited < 2000){
    await new Promise(r => setTimeout(r, 50));
    waited += 50;
  }
  if(!window.pdfjsLib) throw new Error('PDF.js 未ロード');
  return pdfGetDocWithFallback(partIdx);
}

// ページ情報ラベル更新
function pdfUpdatePageInfo(){
  const el = document.getElementById('pdf-page-info');
  if(!el) return;
  const cur = Math.floor(pdfGlobalPage);
  const tot = Math.floor(pdfTotalPages);
  el.textContent = tot ? `${cur} / ${tot}` : `${cur}`;
}

// 1ページ描画（CSS transformはリセットせず維持）
async function pdfDrawSinglePage(partIdx, localPage){
  const doc = await pdfGetDoc(partIdx);
  if(localPage > doc.numPages){
    // このパートにlocalPageが存在しない → 最終パート確定
    pdfHasMore = false;
    if(pdfTotalPages === 0 || pdfGlobalPage > pdfTotalPages){
      pdfTotalPages = (partIdx) * PAGES_PER_PART + doc.numPages;
    }
    pdfUpdatePageInfo();
    return false;
  }

  pdfDoc = doc;
  const pagesDiv = document.getElementById('pdf-pages');
  const wrap     = document.getElementById('pdf-canvas-wrap');
  pagesDiv.innerHTML = '';

  const fitW = wrap ? wrap.clientWidth - 20 : 800;
  const dpr  = window.devicePixelRatio || 1;
  const page = await doc.getPage(localPage);
  const vp1  = page.getViewport({scale:1});
  const baseScale = fitW / vp1.width;
  const sc   = pdfUserScale !== null ? pdfUserScale : baseScale;
  const viewport = page.getViewport({scale: sc});

  const canvas = document.createElement('canvas');
  canvas.width  = viewport.width  * dpr;
  canvas.height = viewport.height * dpr;
  canvas.style.width  = viewport.width  + 'px';
  canvas.style.height = viewport.height + 'px';
  pagesDiv.appendChild(canvas);

  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  await page.render({canvasContext: ctx, viewport}).promise;

  // 既存のtotalPages未確定なら次パートを非同期プリロードして総ページ数を把握
  if(pdfHasMore && pdfTotalPages === 0){
    pdfPreloadNext(partIdx + 1);
  }
  pdfUpdatePageInfo();
  return true;
}

// 次パートをバックグラウンドでプリロード
async function pdfPreloadNext(nextPartIdx){
  try{
    const doc = await pdfGetDoc(nextPartIdx);
    // 次パートが存在 → さらにその次も確認
    if(doc.numPages < PAGES_PER_PART){
      // このパートが最後（5ページ未満）
      pdfHasMore  = false;
      pdfTotalPages = nextPartIdx * PAGES_PER_PART + doc.numPages;
      pdfUpdatePageInfo();
    } else {
      // まだ続く可能性 → さらに次を確認
      pdfPreloadNext(nextPartIdx + 1);
    }
  } catch(e){
    // 存在しない → 前パートが最後
    pdfHasMore    = false;
    pdfTotalPages = nextPartIdx * PAGES_PER_PART;
    pdfUpdatePageInfo();
  }
}

// グローバルページに移動（メイン関数）
async function pdfGoToPage(globalPage){
  if(pdfNavigating) return;
  if(globalPage < 1) return;
  if(pdfTotalPages && globalPage > pdfTotalPages) return;

  pdfNavigating = true;
  pdfShowLoading('');

  try{
    const { partIdx, localPage } = calculatePdfLocation(globalPage);
    const ok = await pdfDrawSinglePage(partIdx, localPage);
    if(ok){
      pdfGlobalPage = globalPage;
      pdfPartIdx    = partIdx;
      pdfHideOverlay();
      pdfUpdatePageInfo();
    }
  } catch(e){
    // ファイルが存在しない → 前ページが末尾
    pdfHasMore    = false;
    pdfTotalPages = pdfGlobalPage;
    pdfUpdatePageInfo();
    pdfHideOverlay();
  }
  pdfNavigating = false;
}

// ◀▶ボタン・キーボードから呼ばれる
function pdfPageGo(delta){
  pdfGoToPage(pdfGlobalPage + delta);
}

async function pdfOpenPart(){
  if(!pdfParts.length) return;
  pdfDoc         = null;
  pdfDocCache    = {};
  pdfGlobalPage  = 1;
  pdfTotalPages  = 0;
  pdfHasMore     = true;
  pdfUserScale   = null;
  if(window._pdfResetTransform) window._pdfResetTransform();
  document.getElementById('pdf-zoom-label').textContent = '幅合わせ';
  document.getElementById('pdf-page-info').textContent  = '読み込み中…';
  pdfShowLoading('読み込み中…');
  await pdfGoToPage(1);
}

// 旧関数との互換（pdfJumpToArticleから呼ばれる）
async function pdfPrev(){ pdfPageGo(-1); }
async function pdfNext(){ pdfPageGo(1); }

// 全ページ描画（zoom reset時に現在ページを再描画）
async function pdfDrawAllPages(){
  if(!pdfDoc) return;
  const { partIdx, localPage } = calculatePdfLocation(pdfGlobalPage);
  await pdfDrawSinglePage(partIdx, localPage);
}

// キーボードナビゲーション
document.addEventListener('keydown', (e)=>{
  if(document.activeElement && ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) return;
  if(!pdfDoc) return;
  if(e.key === 'ArrowRight' || e.key === 'ArrowDown'){

});
function pdfOpen(){

async function pdfZoom(factor){
  if(!pdfDoc) return;
  const wrap = document.getElementById('pdf-canvas-wrap');
  const fitW = (wrap ? wrap.clientWidth - 20 : 800);
  const page = await pdfDoc.getPage(1);
  const vp1  = page.getViewport({scale:1});
  const base = fitW / vp1.width;
  if(pdfUserScale === null) pdfUserScale = base;
  pdfUserScale = Math.max(base * 0.3, Math.min(base * 5.0, pdfUserScale * factor));
  document.getElementById('pdf-zoom-label').textContent =
    Math.round(pdfUserScale / base * 100) + '%';
  pdfDrawAllPages();
}

// 記事の面番号からPDFのPartとページに移動
async function pdfJumpToArticle(article){
  if(!article) return;
  // pdfPage フィールドがあればそれを使う、なければ men から抽出
  let pageNum = null;
  if(article.pdfPage){

// ── Pan / Zoom（CSS transform方式） ──
(function(){
  const ZOOM_STEP = 1.12;
  const ZOOM_MIN  = 0.3;
  const ZOOM_MAX  = 8.0;

  let tx = 0, ty = 0, scale = 1.0; // 現在の状態
  let dragging = false, startX = 0, startY = 0, startTx = 0, startTy = 0;

  function getWrap(){ return document.getElementById('pdf-canvas-wrap'); }
  function getPages(){ return document.getElementById('pdf-pages'); }

  function applyTransform(){
    const pages = getPages();
    if(pages) pages.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  }

  function clampTranslate(){
    // コンテンツが完全に外に出ないよう最低限クランプ
    const wrap  = getWrap();
    const pages = getPages();
    if(!wrap || !pages) return;
    const cw = wrap.clientWidth, ch = wrap.clientHeight;
    const pw = pages.scrollWidth * scale, ph = pages.scrollHeight * scale;
    const minX = Math.min(0, cw - pw - 16);
    const minY = Math.min(0, ch - ph - 16);
    tx = Math.max(minX, Math.min(16, tx));
    ty = Math.max(minY, Math.min(16, ty));
  }

  // ズームラベル更新
  function updateLabel(){
    const lbl = document.getElementById('pdf-zoom-label');
    if(lbl) lbl.textContent = Math.round(scale * 100) + '%';
  }

  // カーソル位置中心でズーム
  function zoomAt(clientX, clientY, factor){
    const wrap = getWrap();
    if(!wrap) return;
    const rect = wrap.getBoundingClientRect();
    const cx = clientX - rect.left;  // コンテナ内X
    const cy = clientY - rect.top;   // コンテナ内Y

    const newScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, scale * factor));
    const ratio = newScale / scale;

    // カーソル下の点が動かないようtx/tyを補正
    tx = cx - ratio * (cx - tx);
    ty = cy - ratio * (cy - ty);
    scale = newScale;

    clampTranslate();
    applyTransform();
    updateLabel();
  }

  // ── Wheel → zoom ──
  function onWheel(e){
    if(!e.target.closest('#pdf-canvas-wrap')) return;
    e.preventDefault();
    const factor = e.deltaY < 0 ? ZOOM_STEP : 1 / ZOOM_STEP;
    zoomAt(e.clientX, e.clientY, factor);
  }
  document.addEventListener('wheel', onWheel, { passive: false });

  // ── Drag → pan ──
  function onMouseDown(e){
    if(e.button !== 0) return;
    const wrap = getWrap();
    if(!wrap || !e.target.closest('#pdf-canvas-wrap')) return;
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    startTx = tx; startTy = ty;
    wrap.classList.add('grabbing');
    e.preventDefault();
  }
  function onMouseMove(e){
    if(!dragging) return;
    tx = startTx + (e.clientX - startX);
    ty = startTy + (e.clientY - startY);
    clampTranslate();
    applyTransform();
  }
  function onMouseUp(){
    if(!dragging) return;
    dragging = false;
    getWrap()?.classList.remove('grabbing');
  }
  document.addEventListener('mousedown', onMouseDown);
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup',   onMouseUp);
  document.addEventListener('mouseleave', onMouseUp);

  // ── ここから追加：スマホ・iPad用 タッチ操作（スワイプ＆ピンチズーム） ──
  let initialPinchDistance = null;
  let lastTouchPoint = null;

  document.addEventListener('touchstart', (e) => {
    const wrap = getWrap();
    if (!wrap || !wrap.contains(e.target)) return;
    if (e.touches.length === 1) {
      lastTouchPoint = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      wrap.classList.add('grabbing');
    } else if (e.touches.length === 2) {
      initialPinchDistance = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  }, { passive: false });

  document.addEventListener('touchmove', (e) => {
    const wrap = getWrap();
    if (!wrap || !wrap.contains(e.target)) return;
    e.preventDefault();
    if (e.touches.length === 1 && lastTouchPoint) {
      const currentX = e.touches[0].clientX;
      const currentY = e.touches[0].clientY;
      tx += (currentX - lastTouchPoint.x);
      ty += (currentY - lastTouchPoint.y);
      lastTouchPoint = { x: currentX, y: currentY };
      clampTranslate();
      applyTransform();
    } else if (e.touches.length === 2 && initialPinchDistance) {
      const currentDistance = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const factor = currentDistance / initialPinchDistance;
      const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      zoomAt(midX, midY, factor);
      initialPinchDistance = currentDistance;
    }
  }, { passive: false });

  document.addEventListener('touchend', (e) => {
    if (e.touches.length < 2) initialPinchDistance = null;
    if (e.touches.length === 0) {
      lastTouchPoint = null;
      getWrap()?.classList.remove('grabbing');
    }
  });

  document.addEventListener('touchcancel', (e) => {
    initialPinchDistance = null;
    lastTouchPoint = null;
    getWrap()?.classList.remove('grabbing');
  });
  // ── 追加ここまで ──

  // ── ＋／－ボタン（中心ズーム） ──
  window.pdfZoom = function(factor){
    const wrap = getWrap();
    if(!wrap || !pdfDoc) return;
    const rect = wrap.getBoundingClientRect();
    zoomAt(rect.left + rect.width/2, rect.top + rect.height/2, factor);
  };
  window.pdfZoomReset = function(){
    tx = 0; ty = 0; scale = 1.0;
    applyTransform();
    const lbl = document.getElementById('pdf-zoom-label');
    if(lbl) lbl.textContent = '幅合わせ';
  };

  // 新パート読み込み時にリセット
  const _origPdfOpenPart = window.pdfOpenPart;
  window._pdfResetTransform = function(){ tx=0; ty=0; scale=1.0; applyTransform(); };
})();


function ttsInitVoices(){
  if(speechSynthesis.getVoices().length){ ttsPopulateVoiceSelect(); }
}
speechSynthesis.onvoiceschanged = ()=>{ ttsPopulateVoiceSelect(); };
ttsInitVoices();
setTimeout(ttsInitVoices, 500);
setTimeout(ttsInitVoices, 1500);

</script>

    <span id="sb-toggle-label">◀ 目次</span>
  </div>

<!-- BGM Panel -->
<div id="bgm-panel" class="minimized">
  <div id="bgm-head" onclick="bgmTogglePanel()">
    <span>🎵</span>
    <span id="bgm-title">BGM</span>
    <span id="bgm-toggle-btn">▲ 開く</span>
  </div>
  <div id="bgm-body">
    <div id="bgm-now-playing">— 停止中 —</div>
    <div class="bgm-cat-row" id="bgm-cats"></div>
    <div class="bgm-row">
      <label>音量</label>
      <input type="range" id="bgm-vol" min="0" max="100" value="22" oninput="bgmSetVol(this.value)">
      <span id="bgm-vol-label" style="font-size:11px;color:var(--muted);min-width:24px;">22</span>
    </div>
    <div class="bgm-ctrl">
      <button id="bgm-play-btn" onclick="bgmTogglePlay()">▶ 再生</button>
      <button onclick="bgmNext()">次の曲 ↻</button>
    </div>
    <div id="bgm-auto-row">
      <input type="checkbox" id="bgm-auto" checked>
      <label for="bgm-auto">読み上げと連動して自動再生</label>
    </div>
  </div>
</div>
<div id="bgm-yt"></div>

<script>
const BGM_PLAYLISTS = [
  { id:'lofi',    label:'🎧 Lo-fi チル',   listId:'RDK0ibBPhiaG0',  startVid:'aJOTlE1K90k' },
  { id:'jazz',    label:'☕ カフェジャズ',  listId:'PLXmD3BO4xUG0T0YaXLitkGbVoOoRjMX23', startVid:null },
  { id:'piano',   label:'🎹 ピアノ',        listId:'PLlHnRHSRJfZ9bKGONEMy8vwkYFKH8BPBE', startVid:null },
  { id:'classic', label:'🎻 クラシック',    listId:'PLqMagBrKXJMBtFuZWnVQVWQ2yQPIjt8y_', startVid:null },
  { id:'nature',  label:'🌿 自然音',        listId:'PLMIbmfP_9vb8BCxRoraJpoo4q1yMFg4CE',  startVid:null },
];
let bgmCurCat='lofi', bgmPlayer=null, bgmReady=false, bgmPlaying=false, bgmPanelOpen=false;
const BGM_RANDOM_WINDOW = 80;
let bgmLastIndex = -1;

function bgmRandomIndex(){
  if(BGM_RANDOM_WINDOW <= 1) return 0;
  let idx = Math.floor(Math.random() * BGM_RANDOM_WINDOW);
  if(idx === bgmLastIndex) idx = (idx + 1) % BGM_RANDOM_WINDOW;
  bgmLastIndex = idx;
  return idx;
}

function bgmShuffleNext(){
  if(!bgmReady || !bgmPlayer) return;
  try{
    const idx = bgmRandomIndex();
    if(typeof bgmPlayer.playVideoAt === 'function') bgmPlayer.playVideoAt(idx);
    else bgmPlayer.nextVideo();
  }catch(e){
    try{ bgmPlayer.nextVideo(); }catch(_) {}
  }
}

function bgmTogglePanel(){
  bgmPanelOpen=!bgmPanelOpen;
  document.getElementById('bgm-panel').classList.toggle('minimized',!bgmPanelOpen);
  document.getElementById('bgm-toggle-btn').textContent=bgmPanelOpen?'▼ 閉じる':'▲ 開く';
  if(bgmPanelOpen && !bgmReady) bgmInit();
}

function bgmInit(){
  if(bgmReady) return;
  const row=document.getElementById('bgm-cats');
  row.innerHTML=BGM_PLAYLISTS.map(p=>
    `<button class="bgm-cat-btn${p.id===bgmCurCat?' on':''}" onclick="bgmSetCat('${p.id}')">${p.label}</button>`
  ).join('');
  if(!window.YT){
    const s=document.createElement('script');
    s.src='https://www.youtube.com/iframe_api';
    document.head.appendChild(s);
  } else if(window.YT && window.YT.Player){ bgmCreatePlayer(bgmCurCat); }
}

window.onYouTubeIframeAPIReady=function(){ bgmCreatePlayer(bgmCurCat); };

function bgmCreatePlayer(catId){
  const cat=BGM_PLAYLISTS.find(p=>p.id===catId);
  const startIndex = bgmRandomIndex();
  const vars={
    autoplay:0, loop:1, controls:0, disablekb:1,
    fs:0, modestbranding:1, playsinline:1,
    list: cat.listId, listType:'playlist', index:startIndex
  };
  if(cat.startVid && startIndex===0) vars.videoId=cat.startVid;

  if(bgmPlayer){
    bgmPlayer.destroy();
    bgmPlayer=null;
    bgmReady=false;
    document.getElementById('bgm-yt').innerHTML='';
  }

  bgmPlayer=new YT.Player('bgm-yt',{
    height:'1',width:'1',
    videoId: (cat.startVid && startIndex===0) ? cat.startVid : undefined,
    playerVars: vars,
    events:{
      onReady:e=>{
        bgmReady=true;
        e.target.setVolume(parseInt(document.getElementById('bgm-vol').value));
        e.target.setShuffle(true);
        bgmUpdateNowPlaying();
      },
      onStateChange:e=>{
        if(e.data===YT.PlayerState.ENDED) bgmShuffleNext();
        bgmPlaying=(e.data===YT.PlayerState.PLAYING);
        const btn=document.getElementById('bgm-play-btn');
        if(btn){ btn.textContent=bgmPlaying?'⏸ 停止':'▶ 再生'; btn.classList.toggle('playing',bgmPlaying); }
        if(bgmPlaying) bgmUpdateNowPlaying();
      },
      onError:e=>{
        console.warn('[BGM] エラー',e.data,'→ 次へ');
        setTimeout(()=>{ if(bgmReady) bgmShuffleNext(); },1500);
      }
    }
  });
}

function bgmTogglePlay(){
  if(!bgmReady){ bgmInit(); setTimeout(bgmTogglePlay,1800); return; }
  bgmPlaying ? bgmPlayer.pauseVideo() : bgmPlayer.playVideo();
}

function bgmPlay(){
  if(!document.getElementById('bgm-auto')?.checked) return;
  if(!bgmReady){ bgmInit(); setTimeout(bgmPlay,1800); return; }
  if(!bgmPlaying) bgmPlayer.playVideo();
}
function bgmPause(){
  if(!document.getElementById('bgm-auto')?.checked) return;
  if(bgmReady && bgmPlaying) bgmPlayer.pauseVideo();
}

function bgmNext(){
  if(!bgmReady) return;
  bgmShuffleNext();
}

function bgmSetCat(id){
  bgmCurCat=id;
  document.querySelectorAll('.bgm-cat-btn').forEach((b,i)=>b.classList.toggle('on',BGM_PLAYLISTS[i].id===id));
  bgmCreatePlayer(id);
}

function bgmSetVol(v){
  document.getElementById('bgm-vol-label').textContent=v;
  if(bgmReady) bgmPlayer.setVolume(parseInt(v));
}

function bgmUpdateNowPlaying(){
  const cat=BGM_PLAYLISTS.find(p=>p.id===bgmCurCat);
  const el=document.getElementById('bgm-now-playing');
  if(el) el.innerHTML=`<strong>${cat.label}</strong> 再生中 🎵`;
  try{
    const data=bgmPlayer.getVideoData();
    if(data && data.title && el) el.innerHTML=`<strong>${cat.label}</strong><br><span style="font-size:10px;">${data.title.slice(0,36)}…</span>`;
  }catch(e){}
}
</script>
</body>
